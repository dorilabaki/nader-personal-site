<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" fill="none">
  <rect width="800" height="900" fill="#1A1714"/>
  <rect width="800" height="900" fill="url(#grain)" opacity="0.15"/>
  <circle cx="400" cy="350" r="280" fill="url(#warm)"/>
  <circle cx="500" cy="300" r="180" fill="url(#amber)" opacity="0.4"/>
  <circle cx="350" cy="500" r="120" fill="url(#deep)" opacity="0.3"/>
  <!-- Silhouette suggestion -->
  <ellipse cx="400" cy="340" rx="85" ry="95" fill="#2A2520" opacity="0.6"/>
  <rect x="310" y="420" width="180" height="280" rx="20" fill="#2A2520" opacity="0.5"/>
  <defs>
    <radialGradient id="warm" cx="0.4" cy="0.4">
      <stop offset="0%" stop-color="#E07830" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1A1714" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amber" cx="0.5" cy="0.5">
      <stop offset="0%" stop-color="#FBDA6E" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1A1714" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="deep" cx="0.5" cy="0.5">
      <stop offset="0%" stop-color="#C46520" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1A1714" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3"/>
    </filter>
  </defs>
</svg>
